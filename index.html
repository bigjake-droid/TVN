<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Vindex | Core Access</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #030507;
            color: #8c9b9d;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* CRT Scanline Effect Overlay */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Layer Management */
        .active-layer { display: flex; flex-direction: column; align-items: center; z-index: 5; animation: fadeIn 1s ease-in forwards; width: 100%; padding: 20px;}
        .hidden-layer { display: none; }
        .fade-out { animation: fadeOut 0.5s ease-out forwards; }

        /* Splash Screen Elements */
        .terminal-loader {
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            color: #a3a3a3;
            margin-bottom: 2rem;
            min-height: 30px;
            text-align: center;
        }
        .cursor { display: inline-block; width: 10px; height: 18px; background-color: #d32f2f; margin-left: 6px; animation: blink 1s step-end infinite; }
        .tactical-btn {
            padding: 12px 35px; background: transparent; border: 1px solid #4a4a4a; color: #fff; font-family: 'Courier New', Courier, monospace; font-size: 1rem; letter-spacing: 0.2rem; cursor: pointer; transition: all 0.3s;
        }
        .tactical-btn:hover { border-color: #d32f2f; color: #d32f2f; box-shadow: 0 0 15px rgba(211, 47, 47, 0.3); }
        .hidden { opacity: 0; pointer-events: none; }

        /* Auth Terminal Box */
        .auth-terminal {
            width: 100%; max-width: 450px; padding: 40px 30px; border: 1px solid #1a2b3c; background: rgba(5, 10, 15, 0.85); box-shadow: 0 0 30px rgba(0, 0, 0, 0.9); position: relative; z-index: 5; backdrop-filter: blur(5px);
        }
        .classification { font-size: 0.75rem; letter-spacing: 0.2rem; color: #d32f2f; margin-bottom: 30px; text-align: center; text-transform: uppercase; }
        
        /* Animated Roman Header */
        .roman-header { text-align: center; margin-bottom: 30px; }
        .roman-header h1 { 
            font-family: 'Times New Roman', Times, serif; font-size: clamp(2.5rem, 8vw, 3rem); font-weight: normal; color: #e0e0e0; letter-spacing: 0.5rem; margin-bottom: 10px; 
            animation: pulse-glow 3s infinite alternate;
        }
        .roman-header p { font-size: 0.75rem; letter-spacing: 0.3rem; color: #5a6b7c; }

        /* Form Elements */
        .hidden-form { display: none; }
        .input-block { margin-bottom: 25px; }
        .input-block label { display: block; font-size: 0.75rem; letter-spacing: 0.15rem; margin-bottom: 8px; color: #4a6b8c; text-align: center;}
        .input-block input { width: 100%; background: transparent; border: none; border-bottom: 1px solid #2a3b4c; color: #fff; font-family: 'Courier New', Courier, monospace; font-size: 1.2rem; padding: 10px 5px; outline: none; text-align: center; letter-spacing: 0.2rem; transition: 0.3s; }
        .input-block input:focus { border-bottom: 1px solid #d4af37; }

        /* Buttons */
        .auth-btn, .submit-btn, .back-btn {
            width: 100%; background: transparent; border: 1px solid #2a3b4c; color: #8c9b9d; font-family: 'Courier New', Courier, monospace; font-size: 0.9rem; letter-spacing: 0.2rem; padding: 15px; cursor: pointer; margin-top: 15px; transition: 0.3s; text-transform: uppercase;
        }
        .auth-btn:hover, .submit-btn:hover { border-color: #e0e0e0; color: #030507; background: #e0e0e0; }
        .form-actions { display: flex; gap: 10px; }
        .back-btn { width: 30%; border-color: #4a4a4a; color: #4a4a4a; }
        .back-btn:hover { border-color: #d32f2f; color: #d32f2f; }
        .submit-btn { width: 70%; }

        .error-text { color: #d32f2f; font-size: 0.8rem; text-align: center; margin-top: 15px; min-height: 20px;}

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.95); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes pulse-glow { 0% { text-shadow: 0 0 5px rgba(212, 175, 55, 0.2); } 100% { text-shadow: 0 0 20px rgba(212, 175, 55, 0.8); color: #fff; } }
    </style>
</head>
<body>

    <div id="splash-layer" class="active-layer">
        <div class="classification">[ RESTRICTED // VINDEX_NETWORK ]</div>
        <div class="terminal-loader">
            <span id="terminal-text"></span><span class="cursor"></span>
        </div>
        <button id="initialize-btn" class="tactical-btn hidden">> INITIALIZE</button>
    </div>

    <div id="auth-layer" class="hidden-layer">
        <div class="auth-terminal">
            <div class="classification">[ NSA_CORE_ACCESS_LOG ]</div>

            <div class="roman-header">
                <h1>VOX DEI</h1>
                <p>VERITAS . LIBERTAS . IUSTITIA</p>
            </div>

            <div id="auth-selection">
                <button id="btn-login" class="auth-btn">> LOG IN</button>
                <button id="btn-new-candidate" class="auth-btn">> NEW CANDIDATE</button>
            </div>

            <form id="login-form" class="hidden-form">
                <div class="input-block">
                    <label>[ IDENTITY_NODE ]</label>
                    <input type="text" id="login-user" autocomplete="off" required>
                </div>
                <div class="input-block">
                    <label>[ PASSPHRASE ]</label>
                    <input type="password" id="login-pass" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="back-btn">< BACK</button>
                    <button type="submit" class="submit-btn">> AUTHENTICATE</button>
                </div>
                <div id="login-error" class="error-text"></div>
            </form>

            <form id="register-form" class="hidden-form">
                <div class="input-block">
                    <label>[ NEW_IDENTITY_NODE ]</label>
                    <input type="text" id="reg-user" autocomplete="off" required>
                </div>
                <div class="input-block">
                    <label>[ PASSPHRASE ]</label>
                    <input type="password" id="reg-pass" required>
                </div>
                <div class="input-block">
                    <label>[ VERIFY_PASSPHRASE ]</label>
                    <input type="password" id="reg-pass-verify" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="back-btn">< BACK</button>
                    <button type="submit" class="submit-btn">> ENCRYPT & STORE</button>
                </div>
                <div id="reg-error" class="error-text"></div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const terminalText = document.getElementById("terminal-text");
            const initBtn = document.getElementById("initialize-btn");
            const splashLayer = document.getElementById("splash-layer");
            const authLayer = document.getElementById("auth-layer");

            const authSelection = document.getElementById("auth-selection");
            const loginForm = document.getElementById("login-form");
            const registerForm = document.getElementById("register-form");
            
            const bootSequence = "> FETCHING ENCRYPTED PAYLOAD...";
            let index = 0;
            
            function typeText() {
                if (index < bootSequence.length) {
                    terminalText.textContent += bootSequence.charAt(index);
                    index++;
                    setTimeout(typeText, 40);
                } else {
                    setTimeout(() => {
                        terminalText.textContent = "> PAYLOAD SECURED. SYSTEM READY.";
                        initBtn.classList.remove("hidden");
                    }, 500);
                }
            }
            setTimeout(typeText, 800);

            initBtn.addEventListener("click", () => {
                splashLayer.classList.add("fade-out");
                setTimeout(() => {
                    splashLayer.classList.replace("active-layer", "hidden-layer");
                    authLayer.classList.replace("hidden-layer", "active-layer");
                    
                    if (localStorage.getItem("vindex_user")) {
                        showLoginForm();
                    }
                }, 500);
            });

            document.getElementById("btn-login").addEventListener("click", showLoginForm);
            document.getElementById("btn-new-candidate").addEventListener("click", showRegisterForm);
            
            document.querySelectorAll(".back-btn").forEach(btn => {
                btn.addEventListener("click", resetAuthUI);
            });

            function showLoginForm() {
                authSelection.style.display = "none";
                loginForm.style.display = "block";
                registerForm.style.display = "none";
                const savedUser = localStorage.getItem("vindex_user");
                if(savedUser) document.getElementById("login-user").value = savedUser;
            }

            function showRegisterForm() {
                authSelection.style.display = "none";
                loginForm.style.display = "none";
                registerForm.style.display = "block";
            }

            function resetAuthUI() {
                authSelection.style.display = "block";
                loginForm.style.display = "none";
                registerForm.style.display = "none";
                document.getElementById("login-error").textContent = "";
                document.getElementById("reg-error").textContent = "";
            }

            registerForm.addEventListener("submit", (e) => {
                e.preventDefault();
                const user = document.getElementById("reg-user").value;
                const pass1 = document.getElementById("reg-pass").value;
                const pass2 = document.getElementById("reg-pass-verify").value;
                const errorText = document.getElementById("reg-error");

                if (pass1 !== pass2) {
                    errorText.textContent = "[!] PASSPHRASES DO NOT MATCH";
                    return;
                }

                localStorage.setItem("vindex_user", user);
                localStorage.setItem("vindex_pass", pass1); 
                
                const submitBtn = registerForm.querySelector(".submit-btn");
                submitBtn.textContent = "> ENCRYPTING...";
                submitBtn.style.color = "#00ff00";

                setTimeout(() => {
                    window.location.href = "command-center.html";
                }, 1000);
            });

            loginForm.addEventListener("submit", (e) => {
                e.preventDefault();
                const user = document.getElementById("login-user").value;
                const pass = document.getElementById("login-pass").value;
                const errorText = document.getElementById("login-error");

                const savedUser = localStorage.getItem("vindex_user");
                const savedPass = localStorage.getItem("vindex_pass");

                if (!savedUser) {
                    errorText.textContent = "[!] NO CANDIDATE RECORD FOUND";
                    return;
                }

                if (user === savedUser && pass === savedPass) {
                    const submitBtn = loginForm.querySelector(".submit-btn");
                    submitBtn.textContent = "> ACCESS GRANTED";
                    submitBtn.style.color = "#00ff00";
                    
                    setTimeout(() => {
                        window.location.href = "command-center.html";
                    }, 1000);
                } else {
                    errorText.textContent = "[!] INVALID CREDENTIALS";
                }
            });
        });
    </script>
</body>
</html>
