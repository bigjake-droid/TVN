<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vindex Network | CounterMeasure</title>
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            background-color: #050505; /* Deep, almost black abyss */
            font-family: 'Courier New', Courier, monospace; /* Terminal vibe */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #d1d5db; /* Light silver */
        }

        /* Radial gradient overlay for depth */
        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(31, 31, 31, 0.8) 0%, rgba(5, 5, 5, 1) 100%);
            z-index: 0;
        }

        .splash-container {
            position: relative;
            z-index: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 2s ease-in-out;
        }

        /* The VN Silver Emblem */
        .vn-emblem {
            font-size: 4rem;
            font-family: 'Times New Roman', serif; /* Classic, stoic serif for the VN */
            letter-spacing: 0.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(to bottom, #ffffff 0%, #8c8c8c 50%, #4a4a4a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 15px rgba(255, 255, 255, 0.1);
        }

        /* Main App Title */
        .app-title {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 0.4rem;
            text-transform: uppercase;
            font-family: 'Arial', sans-serif;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        /* The Motto */
        .motto {
            font-size: 0.85rem;
            letter-spacing: 0.2rem;
            color: #6b7280; /* Muted grey */
            text-transform: uppercase;
            margin-bottom: 3rem;
            font-weight: 600;
        }

        /* Simulated Terminal Loader */
        .terminal-loader {
            font-size: 0.9rem;
            color: #8c8c8c;
            text-align: left;
            width: 100%;
            max-width: 300px;
            border-top: 1px solid #333;
            padding-top: 1rem;
            display: flex;
            align-items: center;
        }

        .terminal-text {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            animation: typing 2.5s steps(30, end);
        }

        /* Blinking Cursor */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: #d32f2f; /* Crimson red accent (the kill-switch) */
            margin-left: 5px;
            animation: blink 1s step-end infinite;
        }

        /* Animations */
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>
    
    <div class="splash-container">
        <div class="vn-emblem">V | N</div>
        
        <h1 class="app-title">CounterMeasure</h1>
        <p class="motto">The burden is theirs. Make them carry it.</p>
        
        <div class="terminal-loader">
            <span class="terminal-text">> LOADING PROVE_IT PROTOCOL</span><span class="cursor"></span>
        </div>
    </div>
</body>
</html>
